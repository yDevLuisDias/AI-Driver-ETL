services:
  postgres:
    image: postgres:16-alpine
    container_name: aidrivedb
    environment:
      POSTGRES_DB: aidrivedb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  pgdata:
